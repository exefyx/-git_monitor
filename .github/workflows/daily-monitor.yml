name: Daily Monitor

on:
  schedule:
    - cron: "37 19 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run crawler
        run: |
          python scripts/unidays_monitor.py --run
          python scripts/studentbeans_monitor.py --run
          python scripts/build_dashboard.py

      - name: Send Feishu notification
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          python scripts/notify_feishu.py

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs unidays_outputs studentbeans_outputs

          git commit -m "update dashboard $(date +'%Y-%m-%d')" || echo "No changes to commit"

          git push