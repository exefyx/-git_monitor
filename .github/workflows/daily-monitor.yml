name: Daily Monitor

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:

concurrency:
  group: daily-monitor-main
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Run crawler
        run: |
          python scripts/unidays_monitor.py --run
          python scripts/studentbeans_monitor.py --run
          python scripts/validate_crawl_outputs.py
          python scripts/build_dashboard.py
          python scripts/build_ios26_preview.py

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add docs
          git add -f unidays_outputs studentbeans_outputs

          git commit -m "update dashboard $(date +'%Y-%m-%d')" || echo "No changes to commit"

          git pull --rebase origin main
          git push

      - name: Send Feishu notification
        env:
          FEISHU_WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
        run: |
          python scripts/notify_feishu.py

      - name: Sync Feishu Bitable archive
        continue-on-error: true
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BITABLE_APP_TOKEN: ${{ secrets.FEISHU_BITABLE_APP_TOKEN }}
          FEISHU_OFFER_TABLE_ID: ${{ secrets.FEISHU_OFFER_TABLE_ID }}
          FEISHU_RUN_TABLE_ID: ${{ secrets.FEISHU_RUN_TABLE_ID }}
          FEISHU_OFFER_ARCHIVE_TABLE_ID: ${{ secrets.FEISHU_OFFER_ARCHIVE_TABLE_ID }}
          FEISHU_RUN_ARCHIVE_TABLE_ID: ${{ secrets.FEISHU_RUN_ARCHIVE_TABLE_ID }}
        run: |
          python scripts/sync_feishu_bitable.py
